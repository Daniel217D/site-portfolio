services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      NUXT_PUBLIC_DEMO_API_URL: ${NUXT_PUBLIC_DEMO_API_URL:-}
      NUXT_PUBLIC_DEMO_API_KEY: ${NUXT_PUBLIC_DEMO_API_KEY:-}
    command: npm run dev -- --host 0.0.0.0

volumes:
  node_modules:

